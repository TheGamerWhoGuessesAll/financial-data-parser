<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinParse</title>
    <link rel="stylesheet" href="index.css?v=4">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="auth-box" style="position: relative;">
        <a href="index.html" style="position: absolute; top: 20px; left: 20px; color: var(--text-light); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Home
        </a>
        <a href="index.html" style="text-decoration: none; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 24px; color: white; font-weight: bold; margin-top: 10px;">
            <span class="logo-icon" style="padding: 4px 10px;">_</span> FINPARSE
        </a>
        <h2>Sign In</h2>
        <p style="color: var(--text-light); text-align: center; margin-bottom: 30px;">Welcome back to your dashboard</p>
        
        <input type="email" id="authEmail" class="auth-input" placeholder="Email Address" required>
        <input type="password" id="authPassword" class="auth-input" placeholder="Password" required>
        
        <button id="authBtn" class="auth-btn">Log In</button>
        
        <div style="margin-top: 15px; text-align: center;">
            <a href="#" id="forgotPasswordLink" style="color: var(--text-light); text-decoration: none; font-size: 13px;">Forgot your password?</a>
        </div>
        
        <div id="authStatus" style="color: #ef4444; margin-top: 10px; font-size: 14px; text-align: center;"></div>
        
        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000;">
            <div class="auth-box" style="width: 100%; max-width: 400px; padding: 30px;">
                <h3 style="margin-top: 0;">Reset Password</h3>
                <p style="color: var(--text-light); font-size: 14px; margin-bottom: 20px;">Enter your email address and we'll send you a recovery link.</p>
                <input type="email" id="resetEmailInput" class="auth-input" placeholder="Email Address">
                <button id="sendResetBtn" class="auth-btn">Send Recovery Link</button>
                <div id="resetStatus" style="margin-top: 15px; font-size: 14px; text-align: center;"></div>
                <button onclick="document.getElementById('forgotPasswordModal').style.display='none'" style="margin-top: 15px; background: transparent; border: none; color: var(--text-light); cursor: pointer; width: 100%;">Cancel</button>
            </div>
        </div>
        
        <div style="margin-top: 20px; text-align: center; font-size: 14px; color: var(--text-light);">
            Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">Sign Up</a>
        </div>
    </div>
    <script src="auth.js?v=4" data-mode="login"></script>
</body>
</html>
