<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Data Parser</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Data Parser</h1>
        <p>Upload your financial records for processing</p>
        
        <div class="dropzone" id="dropzone">
            <div class="icon">📄</div>
            <div class="text">Drag & Drop your file here</div>
            <div class="subtext">or click to browse</div>
            <input type="file" id="fileInput" class="hidden-input">
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
