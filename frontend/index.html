<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Data Parser</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Financial Data Parser</h1>
        <p class="subtitle">Upload unstructured financial data for processing</p>
        
        <div class="dropzone" id="dropzone">
            <div class="icon">📄</div>
            <div class="text">Drag & Drop your file here</div>
            <div class="subtext">or click to browse</div>
            <input type="file" id="fileInput" class="hidden-input">
        </div>
        
        <div style="margin-top: 20px; text-align: left;">
            <label for="keywords" style="display: block; margin-bottom: 8px; color: var(--text-light); font-size: 14px; font-weight: 500;">Suspicious Keywords (comma separated):</label>
            <input type="text" id="keywords" value="suspicious, fraud, unauthorized, error, anomaly" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-family: inherit; color: var(--text); background: #f8fafc; transition: border-color 0.3s ease;">
        </div>

        <div id="status" class="status"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
