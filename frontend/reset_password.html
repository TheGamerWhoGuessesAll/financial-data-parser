<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | FinParse</title>
    <link rel="stylesheet" href="index.css?v=5">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="auth-box">
        <a href="index.html" style="text-decoration: none; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 24px; color: white; font-weight: bold;">
            <span class="logo-icon" style="padding: 4px 10px;">_</span> FINPARSE
        </a>
        <h2>Choose a New Password</h2>
        <p style="color: var(--text-light); text-align: center; margin-bottom: 30px;">Enter your new password below</p>
        
        <input type="password" id="newPassword" class="auth-input" placeholder="New Password" required>
        <input type="password" id="confirmPassword" class="auth-input" placeholder="Confirm Password" required>
        
        <button id="resetBtn" class="auth-btn">Reset Password</button>
        
        <div id="resetStatus" style="margin-top: 15px; font-size: 14px; text-align: center;"></div>
    </div>
    <script>
        const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://127.0.0.1:8000' 
            : 'https://financial-data-parser.onrender.com';
            
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const resetBtn = document.getElementById('resetBtn');
            const resetStatus = document.getElementById('resetStatus');
            
            if (!token) {
                resetStatus.style.color = '#ef4444';
                resetStatus.innerText = 'Invalid or missing recovery token.';
                resetBtn.disabled = true;
                return;
            }
            
            resetBtn.addEventListener('click', async () => {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (newPassword.length < 6) {
                    resetStatus.style.color = '#ef4444';
                    resetStatus.innerText = 'Password must be at least 6 characters.';
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    resetStatus.style.color = '#ef4444';
                    resetStatus.innerText = 'Passwords do not match.';
                    return;
                }
                
                resetBtn.disabled = true;
                resetBtn.innerText = 'Updating...';
                
                try {
                    const response = await fetch(`${baseUrl}/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, new_password: newPassword })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        resetStatus.style.color = '#22c55e';
                        resetStatus.innerText = 'Password successfully reset! Redirecting to login...';
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        resetStatus.style.color = '#ef4444';
                        resetStatus.innerText = data.detail || 'Failed to reset password.';
                        resetBtn.disabled = false;
                        resetBtn.innerText = 'Reset Password';
                    }
                } catch (e) {
                    resetStatus.style.color = '#ef4444';
                    resetStatus.innerText = 'Network error. Please try again.';
                    resetBtn.disabled = false;
                    resetBtn.innerText = 'Reset Password';
                }
            });
        });
    </script>
</body>
</html>
